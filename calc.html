<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Equações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 2px;
            color: #333;
        }
        .label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #000;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }
        .input-text {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        /* Menu de sugestões dinâmicas */
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .suggestions-list li {
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .suggestions-list li:hover {
            background-color: #f0f0f0;
        }
        .info-line {
            font-size: 14px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .variables-container {
            margin-bottom: 15px;
        }
        .variable-field {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .variable-field label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .variable-field input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-calcular {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .btn-calcular:hover {
            background-color: #45a049;
        }
        .resultado {
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        /* Notação vetorial com seta superior perfeita */
        .vector {
            position: relative;
            display: inline-block;
            padding-top: 0.6em;
            margin-top: -0.6em;
        }
        .vector::after {
            content: "→";
            position: absolute;
            top: -0.1em;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">CALCULE:</div>
    <div class="label">Nome da Equação:</div>
    
    <div class="input-wrapper">
        <input type="text" id="equationName" class="input-text" placeholder="Ex: Força" autocomplete="off">
        <ul id="suggestions" class="suggestions-list"></ul>
    </div>

    <div class="info-line">
        Simbolo: <span id="lblSimbolo">-</span> | 
        Equação: <span id="lblEquacao">-</span> | 
        Unidade de Medida: <span id="lblUnidade">-</span>
    </div>

    <div id="msgVariaveis" style="font-size: 13px; color: #666; margin-bottom: 15px;">
        Digite ou selecione uma equação válida para inserir as variáveis.
    </div>

    <div id="variablesContainer" class="variables-container"></div>

    <button class="btn-calcular" id="btnCalcular">Calcular</button>

    <div class="resultado">Resultado: <span id="lblResultado">-</span></div>
</div>

<script>
    // Configurações das equações (Símbolos estruturados com HTML para as setas)
    const equacoes = {
        "forca": {
            nomeOriginal: "Força",
            simbolo: '<span class="vector">F</span>',
            equacao: '<span class="vector">F</span> = m · <span class="vector">a</span>',
            unidade: 'N (Newtons)',
            variaveis: [
                { id: 'massa', nome: 'Massa (m) em kg' },
                { id: 'aceleracao', nome: 'Aceleração (<span class="vector">a</span>) em m/s²' }
            ],
            calculo: (vals) => vals.massa * vals.aceleracao
        },
        "velocidade": {
            nomeOriginal: "Velocidade",
            simbolo: '<span class="vector">v</span>',
            equacao: '<span class="vector">v</span> = Δs / Δt',
            unidade: 'm/s',
            variaveis: [
                { id: 'espaco', nome: 'Variação de Espaço (Δs) em metros' },
                { id: 'tempo', nome: 'Variação de Tempo (Δt) em segundos' }
            ],
            calculo: (vals) => vals.tempo !== 0 ? vals.espaco / vals.tempo : "Erro: Divisão por zero"
        },
        "aceleracao": {
            nomeOriginal: "Aceleração",
            simbolo: '<span class="vector">a</span>',
            equacao: '<span class="vector">a</span> = Δ<span class="vector">v</span> / Δt',
            unidade: 'm/s²',
            variaveis: [
                { id: 'velocidade', nome: 'Variação de Velocidade (Δ<span class="vector">v</span>) em m/s' },
                { id: 'tempo', nome: 'Variação de Tempo (Δt) em segundos' }
            ],
            calculo: (vals) => vals.tempo !== 0 ? vals.velocidade / vals.tempo : "Erro: Divisão por zero"
        }
    };

    const inputEq = document.getElementById('equationName');
    const suggestionsUl = document.getElementById('suggestions');

    // Remove acentos e normaliza texto para busca flexível
    function normalizarTexto(txt) {
        return txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    // Gerencia a lista visual de sugestões enquanto o usuário interage
    function renderizarSugestes() {
        const filtro = normalizarTexto(inputEq.value);
        suggestionsUl.innerHTML = '';
        let contagem = 0;

        for (let chave in equacoes) {
            if (chave.includes(filtro) || filtro === '') {
                const li = document.createElement('li');
                li.innerText = equacoes[chave].nomeOriginal;
                li.onclick = () => selecionarEquacao(chave);
                suggestionsUl.appendChild(li);
                contagem++;
            }
        }
        suggestionsUl.style.display = contagem > 0 ? 'block' : 'none';
    }

    function selecionarEquacao(chave) {
        const eq = equacoes[chave];
        inputEq.value = eq.nomeOriginal;
        suggestionsUl.style.display = 'none';

        document.getElementById('lblSimbolo').innerHTML = eq.simbolo;
        document.getElementById('lblEquacao').innerHTML = eq.equacao;
        document.getElementById('lblUnidade').innerHTML = eq.unidade;
        document.getElementById('msgVariaveis').style.display = 'none';

        const container = document.getElementById('variablesContainer');
        container.innerHTML = '';
        document.getElementById('lblResultado').innerHTML = '-';

        // Constrói dinamicamente os inputs numéricos na tela
        eq.variaveis.forEach(v => {
            const div = document.createElement('div');
            div.className = 'variable-field';
            div.innerHTML = `<label>${v.nome}</label><input type="number" id="var_${v.id}" placeholder="0.00">`;
            container.appendChild(div);
        });
    }

    // Processa os dados numéricos e realiza a operação matemática
    function processarCalculo() {
        const chave = normalizarTexto(inputEq.value);
        const eq = equacoes[chave];
        const lblResultado = document.getElementById('lblResultado');

        if (!eq) {
            lblResultado.innerHTML = 'Insira uma equação válida.';
            return;
        }

        const valores = {};
        let valido = true;

        eq.variaveis.forEach(v => {
            const input = document.getElementById(`var_${v.id}`);
            if (input && input.value !== '') {
                valores[v.id] = parseFloat(input.value);
            } else {
                valido = false;
            }
        });

        if (!valido) {
            lblResultado.innerHTML = 'Preencha todos os campos gerados.';
            return;
        }

        const resultadoFinal = eq.calculo(valores);
        lblResultado.innerHTML = typeof resultadoFinal === 'number' ? resultadoFinal.toLocaleString('pt-BR', { maximumFractionDigits: 4 }) : resultadoFinal;
    }

    // Eventos de interface
    inputEq.oninput = renderizarSugestes;
    inputEq.onfocus = renderizarSugestes;
    document.getElementById('btnCalcular').onclick = processarCalculo;

    // Fecha o menu de sugestões ao clicar fora da área do input
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.input-wrapper')) {
            suggestionsUl.style.display = 'none';
        }
    });
</script>

</body>
</html>
