<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Equações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 2px;
            color: #333;
        }
        .label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #000;
        }
        .input-text {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .info-line {
            font-size: 14px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .variables-container {
            margin-bottom: 15px;
        }
        .variable-field {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .variable-field label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .variable-field input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-calcular {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn-calcular:hover {
            background-color: #45a049;
        }
        .resultado {
            font-weight: bold;
            font-size: 16px;
        }
        /* Estilo para a seta do vetor */
        .vector {
            position: relative;
            display: inline-block;
        }
        .vector::after {
            content: "→";
            position: absolute;
            top: -0.5em;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">CALCULE:</div>
    <div class="label">Nome da Equação:</div>
    <input type="text" id="equationName" class="input-text" placeholder="Ex: Força" oninput="atualizarInterface()">

    <div class="info-line">
        Simbolo: <span id="lblSimbolo">-</span> | 
        Equação: <span id="lblEquacao">-</span> | 
        Unidade de Medida: <span id="lblUnidade">-</span>
    </div>

    <div id="msgVariaveis" style="font-size: 13px; color: #333; margin-bottom: 15px;">
        Digite o nome de uma equação válida para ver as variáveis.
    </div>

    <!-- Campos de variáveis gerados dinamicamente -->
    <div id="variablesContainer" class="variables-container"></div>

    <button class="btn-calcular" onclick="calcularResultado()">Calcular</button>

    <div class="resultado">Resultado: <span id="lblResultado">-</span></div>
</div>

<script>
    // Banco de dados das equações suportadas
    const equacoes = {
        "força": {
            simbolo: '<span class="vector">F</span>',
            equacao: '<span class="vector">F</span> = m · <span class="vector">a</span>',
            unidade: 'N (Newtons)',
            variaveis: [
                { id: 'massa', nome: 'Massa (m) em kg' },
                { id: 'aceleracao', nome: 'Aceleração (<span class="vector">a</span>) em m/s²' }
            ],
            calculo: (vals) => vals.massa * vals.aceleracao
        },
        "velocidade": {
            simbolo: '<span class="vector">v</span>',
            equacao: '<span class="vector">v</span> = Δs / Δt',
            unidade: 'm/s',
            variaveis: [
                { id: 'espaco', nome: 'Variação de Espaço (Δs) em metros' },
                { id: 'tempo', nome: 'Variação de Tempo (Δt) em segundos' }
            ],
            calculo: (vals) => vals.tempo !== 0 ? vals.espaco / vals.tempo : "Erro (Divisão por zero)"
        },
        "aceleração": {
            simbolo: '<span class="vector">a</span>',
            equacao: '<span class="vector">a</span> = Δ<span class="vector">v</span> / Δt',
            unidade: 'm/s²',
            variaveis: [
                { id: 'velocidade', nome: 'Variação de Velocidade (Δ<span class="vector">v</span>) em m/s' },
                { id: 'tempo', nome: 'Variação de Tempo (Δt) em segundos' }
            ],
            calculo: (vals) => vals.tempo !== 0 ? vals.velocidade / vals.tempo : "Erro (Divisão por zero)"
        }
    };

    function atualizarInterface() {
        const busca = document.getElementById('equationName').value.trim().toLowerCase();
        const eq = equacoes[busca];

        const lblSimbolo = document.getElementById('lblSimbolo');
        const lblEquacao = document.getElementById('lblEquacao');
        const lblUnidade = document.getElementById('lblUnidade');
        const msgVariaveis = document.getElementById('msgVariaveis');
        const container = document.getElementById('variablesContainer');

        // Limpa campos anteriores
        container.innerHTML = '';
        document.getElementById('lblResultado').innerHTML = '-';

        if (eq) {
            lblSimbolo.innerHTML = eq.simbolo;
            lblEquacao.innerHTML = eq.equacao;
            lblUnidade.innerHTML = eq.unidade;
            msgVariaveis.style.display = 'none';

            // Cria dinamicamente os inputs para as variáveis necessárias
            eq.variaveis.forEach(v => {
                const div = document.createElement('div');
                div.className = 'variable-field';
                
                const label = document.createElement('label');
                label.innerHTML = v.nome;
                
                const input = document.createElement('input');
                input.type = 'number';
                input.id = `var_${v.id}`;
                input.placeholder = 'Digite o valor';
                
                div.appendChild(label);
                div.appendChild(input);
                container.appendChild(div);
            });
        } else {
            lblSimbolo.innerHTML = '-';
            lblEquacao.innerHTML = '-';
            lblUnidade.innerHTML = '-';
            msgVariaveis.style.display = 'block';
        }
    }

    function calcularResultado() {
        const busca = document.getElementById('equationName').value.trim().toLowerCase();
        const eq = equacoes[busca];
        const lblResultado = document.getElementById('lblResultado');

        if (!eq) {
            lblResultado.innerHTML = 'Selecione uma equação válida primeiro.';
            return;
        }

        const valores = {};
        let camposPreenchidos = true;

        eq.variaveis.forEach(v => {
            const input = document.getElementById(`var_${v.id}`);
            if (input && input.value !== '') {
                valores[v.id] = parseFloat(input.value);
            } else {
                camposPreenchidos = false;
            }
        });

        if (!camposPreenchidos) {
            lblResultado.innerHTML = 'Preencha todas as variáveis.';
            return;
        }

        const res = eq.calculo(valores);
        lblResultado.innerHTML = typeof res === 'number' ? `${res.toFixed(2)}` : res;
    }
</script>

</body>
</html>
